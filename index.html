<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Interactive rating component</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <main>
      <!-- Rating state start -->
      <div class="rating-state">
        <img src="./images/icon-star.svg" alt="" />
        <h1 class="heading">How did we do?</h1>
        <p>
          Please let us know how we did with your support request. All feedback
          is appreciated to help us improve our offering!
        </p>

        <ul>
          <li><button class="selection-btn">1</button></li>
          <li><button class="selection-btn">2</button></li>
          <li><button class="selection-btn">3</button></li>
          <li><button class="selection-btn">4</button></li>
          <li><button class="selection-btn">5</button></li>
        </ul>

        <button class="submit-btn">Submit</button>
      </div>
      <!-- Rating state end -->

      <!-- Thank you state start -->
      <div class="results-state hidden">
        <img src="./images/illustration-thank-you.svg" alt="thank you logo" />
        <h2 class="heading">Thank you!</h2>
        <div class="selection">You selected X out of 5</div>
        <p>
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
      </div>
      <!-- Thank you state end -->
    </main>
  </body>
</html>
