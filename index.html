<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Interactive rating component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./index.js" defer></script>
  </head>
  <body>
    <main>
      <!-- Rating state start -->
      <section class="rating-state" id="rating-state">
        <img class="star-icon" src="./images/icon-star.svg" alt="" />
        <div class="text-content">
          <h1 class="heading">How did we do?</h1>
          <p>
            Please let us know how we did with your support request. All
            feedback is appreciated to help us improve our offering!
          </p>
        </div>

        <ul>
          <li><button class="selection-btn">1</button></li>
          <li><button class="selection-btn">2</button></li>
          <li><button class="selection-btn">3</button></li>
          <li><button class="selection-btn">4</button></li>
          <li><button class="selection-btn">5</button></li>
        </ul>

        <button class="submit-btn" id="submit-btn">Submit</button>
      </section>
      <!-- Rating state end -->

      <!-- Thank you state start -->
      <section class="results-state hidden" id="results-state">
        <img
          class="results-img"
          src="./images/illustration-thank-you.svg"
          alt=""
        />
        <div class="selection" id="selection-result">
          You selected X out of 5
        </div>
        <h1 class="heading">Thank you!</h1>
        <p>
          We appreciate you taking the time to give a rating. If you ever need
          more support, don’t hesitate to get in touch!
        </p>
        <button class="return-btn" id="return-btn">Return</button>
      </section>
      <!-- Thank you state end -->
    </main>
  </body>
</html>
